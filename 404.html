<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Page not found - Michael Chen</title>
<style>
  :root {
    --paper: #f3f6f2;
    --ink: #101513;
    --muted: #59655f;
    --teal: #0e4e48;
    --lime: #c7e86a;
    --line: #c8d3ca;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    margin: 0;
    padding: 1rem;
    color: var(--ink);
    background:
      linear-gradient(rgba(16, 21, 19, .045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16, 21, 19, .045) 1px, transparent 1px),
      var(--paper);
    background-size: 42px 42px;
  }

  main {
    width: min(100%, 44rem);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 2rem;
    background: rgba(251, 252, 247, .9);
  }

  p {
    color: var(--muted);
    line-height: 1.55;
  }

  h1 {
    margin: 0;
    font-size: clamp(2.5rem, 9vw, 5rem);
    line-height: .95;
  }

  a {
    display: inline-flex;
    margin-top: 1rem;
    border-radius: 6px;
    padding: .8rem 1rem;
    background: var(--teal);
    color: white;
    font-weight: 700;
    text-decoration: none;
  }

  a:focus-visible {
    outline: 3px solid var(--lime);
    outline-offset: 4px;
  }
</style>
</head>
<body>
<main>
  <h1>Page not found.</h1>
  <p>The portfolio page you are looking for is not available. Return home to review the current work and contact links.</p>
  <a href="./">Go home</a>
</main>
</body>
</html>
